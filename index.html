<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Achadinhos da Nintendo 🎮</title>
<script>
document.addEventListener("DOMContentLoaded", carregarProdutos);

async function carregarProdutos() {
  const area = document.getElementById("resultado");
  area.innerHTML = "🎮 Carregando achadinhos Nintendo...";

  try {
    const produtos = [];

    // 1. Mercado Livre
    const ml = await fetch("https://api.mercadolibre.com/sites/MLB/search?q=nintendo&limit=12");
    const dadosML = await ml.json();
    dadosML.results.forEach(p => {
      produtos.push({
        titulo: p.title,
        preco: p.price,
        imagem: p.thumbnail,
        link: p.permalink,
        loja: "Mercado Livre"
      });
    });

    // 2. MelhorComprar (não bloqueia CORS)
    const mc = await fetch("https://www.melhorcomprar.com.br/search?q=nintendo");
    const html = await mc.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    doc.querySelectorAll(".product-card").forEach(card => {
      const titulo = card.querySelector(".product-title")?.innerText;
      const preco = card.querySelector(".product-price")?.innerText.replace("R$", "").trim();
      const imagem = card.querySelector("img")?.src;
      const link = card.querySelector("a")?.href;

      if (titulo && preco) {
        produtos.push({
          titulo,
          preco: parseFloat(preco.replace(".", "").replace(",", ".")),
          imagem,
          link,
          loja: "Melhor Comprar"
        });
      }
    });

    // Ordenar por preço
    produtos.sort((a, b) => a.preco - b.preco);

    // Renderizar
    area.innerHTML = "";
    produtos.slice(0, 12).forEach((item, index) => {
      const card = document.createElement("a");
      card.href = item.link;
      card.target = "_blank";
      card.className = "card bg-gray-800 p-5 rounded-xl";

      card.innerHTML = `
        <div class="h-40 flex items-center justify-center mb-4">
          <img src="${item.imagem}" class="max-h-36 object-contain"/>
        </div>

        <h3 class="text-sm font-bold mb-2">${item.titulo}</h3>

        <p class="text-green-400 text-2xl font-extrabold">
          R$ ${item.preco.toFixed(2)}
        </p>

        <p class="text-xs text-gray-400 mt-1">${item.loja}</p>

        ${index === 0 ? `
          <div class="mt-3 bg-red-600 text-center py-1 rounded font-bold">
            🏆 Melhor Preço
          </div>` : ``}
      `;

      area.appendChild(card);
    });

  } catch (e) {
    console.error(e);
    area.innerHTML = "❌ Erro ao carregar produtos.";
  }
}
</script>
</body>
</html>
