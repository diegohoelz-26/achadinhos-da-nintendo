<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Achadinhos da Nintendo 🎮</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
  margin:0;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
}
.neon{
  text-shadow:0 0 8px #ff004c,0 0 16px #ff004c;
}
.card:hover{
  box-shadow:0 0 20px #ff004c;
  transform:scale(1.05);
}
</style>
</head>
<body class="text-white">

<header class="bg-gradient-to-r from-red-600 to-pink-600 p-6 text-center text-3xl font-extrabold neon">
🎮 Achadinhos da Nintendo
</header>

<section class="text-center p-6">
<input 
id="busca"
placeholder="Buscar Joy-Con, Switch OLED, Zelda..."
class="w-full max-w-xl p-3 rounded text-black"
/>
<button onclick="buscar()" 
class="mt-4 bg-red-600 hover:bg-pink-500 px-6 py-2 rounded font-bold transition">
🔥 Buscar
</button>
</section>

<main id="resultado" class="p-6 grid md:grid-cols-2 lg:grid-cols-3 gap-6"></main>

<script>

async function buscar(){

  const termo = document.getElementById("busca").value.trim();
  const area = document.getElementById("resultado");

  if(!termo){
    alert("Digite algo para pesquisar.");
    return;
  }

  area.innerHTML = "🎮 Buscando ofertas...";

  try{

    const url = "https://api.mercadolibre.com/sites/MLB/search?q=" 
                + encodeURIComponent(termo)
                + "&limit=12";

    const resposta = await fetch(url);

    if(!resposta.ok){
      throw new Error("Erro na API");
    }

    const dados = await resposta.json();

    if(!dados.results || dados.results.length === 0){
      area.innerHTML = "Nenhum produto encontrado.";
      return;
    }

    const lista = dados.results
      .sort((a,b)=>a.price-b.price)
      .slice(0,9);

    area.innerHTML = "";

    lista.forEach((item,index)=>{

      const card = document.createElement("a");
      card.href = item.permalink;
      card.target="_blank";
      card.className="card bg-gray-800 p-5 rounded-xl transition duration-300";

      card.innerHTML = `
        <div class="h-40 flex items-center justify-center mb-4">
          <img src="${item.thumbnail}" class="max-h-36 object-contain"/>
        </div>

        <h3 class="text-sm font-bold mb-2">${item.title}</h3>

        <p class="text-green-400 text-2xl font-extrabold">
          R$ ${item.price.toFixed(2)}
        </p>

        ${index===0 ? `
          <div class="mt-3 bg-red-600 text-center py-1 rounded font-bold">
            🏆 Melhor Preço
          </div>` : ``}
      `;

      area.appendChild(card);

    });

  }catch(e){
    area.innerHTML = `
      ❌ Não foi possível buscar preços.<br><br>
      ⚠️ Se estiver abrindo pelo computador, publique o site online.
    `;
  }
}

</script>

</body>
</html>
